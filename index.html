<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bangla Live TV — Tab Switcher</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f8f9fa;
      --accent: #0ea5a4;
      --muted: #64748b;
      --text: #1e293b;
      --border: #e2e8f0;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    
    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .tab {
      background: transparent;
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    
    .tab:hover {
      background: rgba(14, 165, 164, 0.05);
      border-color: rgba(14, 165, 164, 0.2);
    }
    
    .tab.active {
      background: linear-gradient(90deg, rgba(14, 165, 164, 0.12), rgba(14, 165, 164, 0.06));
      color: var(--accent);
      border-color: rgba(14, 165, 164, 0.25);
      box-shadow: 0 4px 12px rgba(14, 165, 164, 0.15);
    }
    
    .player-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    
    .player {
      width: 100%;
      max-width: 960px; /* 16:9 aspect ratio base */
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border);
    }
    
    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio (9/16 = 0.5625) */
      background: black;
    }
    
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    
    .title {
      font-weight: 700;
      color: var(--text);
    }
    
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }
    
    .btn:hover {
      background: rgba(14, 165, 164, 0.05);
      border-color: rgba(14, 165, 164, 0.2);
      color: var(--accent);
    }
    
    .note {
      padding: 12px 16px;
      color: var(--muted);
      font-size: 13px;
      background: rgba(0, 0, 0, 0.02);
      border-top: 1px solid var(--border);
    }
    
    @media (max-width: 640px) {
      .topbar {
        padding: 10px;
      }
      
      .tab {
        padding: 7px 9px;
        font-size: 14px;
      }
      
      .player {
        max-width: 100%;
      }
    }
  </style>
  <!-- hls.js CDN (used when browser doesn't natively support HLS in <video>) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="tabs" id="tabs"></div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button id="reloadBtn" class="btn">Reload</button>
      <button id="popoutBtn" class="btn">Pop out</button>
    </div>
  </div>
  
  <div class="player-wrap">
    <div class="player">
      <div class="video-container">
        <video id="video" controls playsinline webkit-playsinline></video>
      </div>
      <div class="meta">
        <div class="title" id="channelTitle">Loading...</div>
        <div class="controls">
          <button id="muteBtn" class="btn">Mute</button>
          <button id="fitBtn" class="btn">Toggle Fit</button>
        </div>
      </div>
      <div class="note">If a stream doesn't play it may be geo-restricted or require CORS. Use a compatible browser (Chrome/Edge/Firefox) and ensure the URL supports HLS.</div>
    </div>
  </div>

  <script>
    // Channel list
    const channels = [
      {name: 'Somoy TV', url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=2202800.m3u8'},
      {name: 'Ekattor TV', url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/1705-audio_113352_eng=113200-video=2202800.m3u8'},
      {name: 'Jamuna TV', url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/1701-audio_113312_eng=113200-video=2202800.m3u8'},
      {name: 'Magic Bangla TV', url: 'http://mbanglatv.jolshabd.com:1935/live/mbanglatv/chunklist_w1542703515.m3u8'},
      {name: 'Independent TV', url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/1704-audio_113342_eng=113200-video=1692000.m3u8'},
      {name: 'NTV', url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/1716-audio_113462_eng=113200-video=2202800.m3u8'},
      {name: 'BTV', url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8'}
    ];

    const tabsEl = document.getElementById('tabs');
    const video = document.getElementById('video');
    const titleEl = document.getElementById('channelTitle');
    let current = 0;
    let hlsInstance = null;

    function createTabs(){
      channels.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (i===0? ' active':'');
        btn.innerText = c.name;
        btn.onclick = () => selectChannel(i);
        tabsEl.appendChild(btn);
      });
    }

    function selectChannel(idx){
      current = idx;
      const url = channels[idx].url;
      // update tab active state
      Array.from(tabsEl.children).forEach((b,i)=> b.classList.toggle('active', i===idx));
      titleEl.textContent = channels[idx].name;

      // destroy existing hls instance
      if(hlsInstance){ try{ hlsInstance.destroy(); }catch(e){} hlsInstance = null; }

      if(video.canPlayType('application/vnd.apple.mpegurl')){
        // Native support (Safari, some mobile)
        video.src = url;
        video.play().catch(()=>{});
      } else if (window.Hls && Hls.isSupported()){
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
          video.play().catch(()=>{});
        });
        hlsInstance.on(Hls.Events.ERROR, function(event, data){
          console.warn('HLS error', event, data);
        });
      } else {
        // last resort: set src and hope for the best
        video.src = url;
        video.play().catch(()=>{
          console.warn('Playback failed - no HLS support');
        });
      }
    }

    // Controls: reload, popout, mute, toggle fit
    document.getElementById('reloadBtn').addEventListener('click', ()=>{
      selectChannel(current);
    });
    
    document.getElementById('popoutBtn').addEventListener('click', ()=>{
      const popup = window.open('', '_blank', 'width=960,height=540');
      popup.document.write('<title>'+channels[current].name+'</title>');
      // basic player in popup
      popup.document.body.style.margin = '0';
      popup.document.body.style.background = '#f8f9fa';
      const container = popup.document.createElement('div');
      container.style.position = 'relative';
      container.style.width = '100%';
      container.style.paddingBottom = '56.25%'; // 16:9 aspect ratio
      container.style.background = 'black';
      const v = popup.document.createElement('video');
      v.controls = true; 
      v.autoplay = true; 
      v.style.position = 'absolute';
      v.style.top = '0';
      v.style.left = '0';
      v.style.width = '100%';
      v.style.height = '100%';
      container.appendChild(v);
      popup.document.body.appendChild(container);
      // attach source using hls if available
      if(window.Hls && Hls.isSupported()){
        const h = new Hls(); 
        h.loadSource(channels[current].url); 
        h.attachMedia(v);
      } else { 
        v.src = channels[current].url; 
      }
    });

    document.getElementById('muteBtn').addEventListener('click', (e)=>{
      video.muted = !video.muted; 
      e.target.textContent = video.muted ? 'Unmute' : 'Mute';
    });
    
    document.getElementById('fitBtn').addEventListener('click', (e)=>{
      if(video.style.objectFit === 'cover'){
        video.style.objectFit = 'contain'; 
        e.target.textContent = 'Fill Screen';
      } else { 
        video.style.objectFit = 'cover'; 
        e.target.textContent = 'Fit Screen';
      }
    });

    // init
    createTabs();
    selectChannel(0);

    // keyboard shortcuts: left/right to switch
    window.addEventListener('keydown', (ev)=>{
      if(ev.key === 'ArrowRight'){ 
        selectChannel((current+1)%channels.length); 
      }
      if(ev.key === 'ArrowLeft'){ 
        selectChannel((current-1+channels.length)%channels.length); 
      }
    });
  </script>
</body>
</html>
